name: Synapt-AutoUpdate-Promo-SEO
on:
  schedule:
    - cron: '0 0 * * 1' # Lunes medianoche
    - cron: '0 12 * * 0,2,3,4,5,6' # Mar a Dom 12:00 PM
  workflow_dispatch:

permissions:
  contents: write # IMPORTANTE: Permite al robot guardar el Sitemap

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - run: pip install requests
      
      - env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python update_movies.py
        
      - name: Guardar Cambios SEO
        run: |
          git config --global user.name 'SynaptBot'
          git config --global user.email 'bot@synapt.live'
          git add sitemap.xml
          git commit -m "SEO: Sitemap actualizado automáticamente" || exit 0
          git push
