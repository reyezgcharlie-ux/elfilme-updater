name: Synapt-AutoUpdate-Promo
on:
  schedule:
    - cron: '0 0 * * 1' # LUNES: Actualiza y Promo
    - cron: '0 12 * * 0,2,3,4,5,6' # MAR A DOM: Solo Promo
  workflow_dispatch: # Botón manual para ti

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests
      - env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python update_movies.py
