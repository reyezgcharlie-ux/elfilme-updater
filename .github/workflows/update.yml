name: Synapt-AutoUpdate-Promo-SEO
on:
  schedule:
    - cron: '0 0 * * 1' # LUNES: Actualización completa
    - cron: '0 12 * * 0,2,3,4,5,6' # MAR A DOM: Solo Promo diaria
  workflow_dispatch: # Tu botón manual en Actions

permissions:
  contents: write # Permiso CRITICO para que el bot guarde el Sitemap

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar Dependencias
        run: pip install requests
      
      - name: Ejecutar Motor SYNAPT
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python update_movies.py
        
      - name: Guardar Cambios SEO
        run: |
          git config --global user.name 'SynaptBot'
          git config --global user.email 'bot@synapt.live'
          # El comando || true evita que el bot falle si el archivo no ha cambiado
          git add sitemap.xml || true
          git commit -m "SEO: Sitemap actualizado automáticamente" || exit 0
          git push
